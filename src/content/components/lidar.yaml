ru:
  name: Лидар
  description: |
    Активный оптический сенсор, измеряющий расстояние с помощью лазерных импульсов.
    Используется для построения карт, обнаружения препятствий и навигации мобильных роботов.
en:
  name: LiDAR
  description: |
    An active optical sensor that measures distance using laser pulses.
    Used for mapping, obstacle detection, and navigation in mobile robots.
