ru:
  description: |
    X Square Robot (自变量机器人) разрабатывает базовую модель воплощённого ИИ WALL-A (VLA + модель мира)
    и гуманоидных роботов, включая Quanta X1 Pro (колёсный двурукий) и Quanta X2 (колёсный гуманоид).
  highlights:
    - WALL-A — глубокая интеграция VLA и модели мира, мультимодальная Chain-of-Thought
    - Первое решение с zero-shot-обобщением мобильной манипуляции
    - Quanta X2 — сквозная связка восприятия и действия
    - Artion Hand — полностью собственная ловкая кисть
en:
  description: |
    X Square Robot develops the WALL-A embodied foundation model (VLA + world model) and humanoid robots including Quanta X1 Pro (wheeled dual-arm) and Quanta X2 (wheeled humanoid).
  highlights:
    - WALL-A - VLA + world model deep integration, multi-modal CoT
    - First to achieve zero-shot generalization for mobile manipulation
    - Quanta X2 - end-to-end from perception to action
    - Artion Hand - fully self-developed dexterous hand
zh:
