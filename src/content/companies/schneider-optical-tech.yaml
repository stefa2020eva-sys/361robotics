en:
  description: |
    Schneider Optical Technologies provides high-end German-made lenses for industrial imaging, cinematography, and photography, featuring 3D free-form surface machining and 99.2% transmittance.
  highlights:
    - Aerospace-grade manufacturing, nanometer curvature accuracy
    - "Multi-layer nano coating, 99.2% transmittance"
    - Customizable industrial lenses
    - Serves semiconductor inspection, machine vision, medical
