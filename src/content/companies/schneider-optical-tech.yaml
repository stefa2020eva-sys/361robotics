  description: |
    Schneider Optical Technologies предлагает высококлассные немецкие объективы для промышленной визуализации, кино и фотографии с обработкой 3D-свободных поверхностей и пропусканием 99,2%.
  highlights:
    - Производство аэрокосмического уровня, нанометровая точность кривизны
