en:
  description: |
    NuDrive produces nutational reducers (ND series) and double-lead offset worm gears (DL series) with high torque, high rigidity, low backlash, and high power density for robots and aerospace.
  highlights:
    - Sharkteeth nutation technology
    - Multi-tooth surface meshing
    - 10+ patent applications
    - 50% of staff in R&D (PhDs and masters)
