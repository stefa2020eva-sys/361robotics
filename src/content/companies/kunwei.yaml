    Kunwei выпускает шестиосевые датчики силы/момента (HRS — гуманоидная серия, HPS — высокопроизводительная, KWR — прецизионная) с точностью <0,1% FS, перекрёстными помехами <0,3% FS, а также одномерные датчики силы.
