ru:
  description: |
    LeedSence выпускает шестиосевые датчики силы (LSF-6D79D), одноосевые датчики силы (LSF-1D33)
    и датчики момента сустава (LSF-TD73-110Nm) для гуманоидных и коллаборативных роботов.
  highlights:
    - Основной разработчик спецификации испытаний многомерных датчиков силы для гуманоидных роботов
    - LSF-6D79D — алюминиевый сплав, высокая точность, помехоустойчивость
    - LSF-1D33 — авиационная легированная сталь, перегрузка 200 % от FS
    - LSF-TD73 — 110 Нм, авиационный алюминий, малая масса
en:
  description: |
    LeedSence provides six-axis force sensors (LSF-6D79D), single-axis force sensors (LSF-1D33), and joint torque sensors (LSF-TD73-110Nm) for humanoid and collaborative robots.
  highlights:
    - Primary drafter of Humanoid Robot Multi-Dimensional Force Sensor Testing Specification
    - "LSF-6D79D: aluminum alloy, high accuracy, anti-interference"
    - "LSF-1D33: aviation alloy steel, 200% FS overload"
    - "LSF-TD73: 110Nm, aviation-grade aluminum, lightweight"
