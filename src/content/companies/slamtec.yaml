ru:
  description: |
    SLAMTEC (思岚科技) предлагает решения для автономной локализации и навигации роботов,
    включая систему пространственного восприятия Aurora S, 48-вольтовое шасси Hermes и LiDAR RPLIDAR S3.
  highlights:
    - Поставлено почти 1 млн устройств, 3000+ корпоративных заказчиков
    - Aurora S — интегрированная AI-VSLAM и 3D-восприятие
    - 48-вольтовое шасси Hermes — батарея 48 В 30 А·ч, разряд 1C для двуруких роботов
    - RPLIDAR S3 — дальность 40 м при отражении 70 %
en:
  description: |
    SLAMTEC provides robot autonomous localization and navigation solutions including Aurora S AI spatial perception system, 48V Hermes chassis, and RPLIDAR S3 LiDAR.
  highlights:
    - Nearly 1 million units delivered, 3,000+ enterprise customers
    - Aurora S - integrated AI-VSLAM, 3D perception
    - 48V Hermes - 48V30AH battery, 1C discharge for dual-arm robots
    - RPLIDAR S3 - 40m range at 70% reflectivity
