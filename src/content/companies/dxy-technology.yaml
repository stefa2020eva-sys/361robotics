ru:
  description: |
    DXY Technology предоставляет комплексные решения для роботов, включая основные чипы (SoC, память, MCU, сенсоры, питание, связь), модули ИИ, eSIM-карты и алгоритмы голосового ИИ.
  highlights:
    - Партнёры — Hisilicon, Smartsens, Quectel, GD, Knowles, Syntiant
    - "Промышленная eSIM EIOTCLUB: −40 °C до 105 °C, ресурс 10 лет"
    - Третье поколение eSIM сертифицировано GSMA SAS-UP
    - "Алгоритм голосового ИИ: 360° захват, шумоподавление, эхоподавление"
en:
  description: |
    DXY Technology provides one-stop robot solutions including core chips (SOCs, storage, MCU, sensors, power, communication), AI hardware modules, eSIM cards, and voice AI algorithms.
  highlights:
    - Partners with Hisilicon, Smartsens, Quectel, GD, Knowles, Syntiant
    - EIOTCLUB industrial eSIM with -40°C to 105°C, 10-year life
    - Third-gen eSIM certified by GSMA SAS-UP
    - Voice AI algorithm for 360° pickup, noise reduction, echo cancellation
