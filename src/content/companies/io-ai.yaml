en:
  description: |
    IO-AI provides teleoperation data collection systems (TeleExperience III) and real-world data collection systems (SenseExperience) for embodied intelligence, serving 60+ robot models for 100+ customers.
  highlights:
    - TeleExperience III - modular input devices, any robot brand, full-body teleoperation
    - SenseExperience - first-person, wrist, UMI views
    - Embodiflow data platform for quality assurance
    - Team from Tencent Robotics X, XPeng Robotics
