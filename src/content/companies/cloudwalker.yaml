ru:
  description: |
    Cloudwalker предлагает робота для уборки навесных стен TNO1 (бионический четвероногий дизайн, вес 50 кг, преодоление препятствий 200 мм) для высотной очистки фасадов.
  highlights:
    - Заменяет «спайдер-мена»-человека при высотной уборке
    - "Преодолевает препятствия 200 мм, адаптируется к большинству фасадных конструкций"
