    - "Физическая чистка щётками, минимум химии"
en:
  description: |
    Cloudwalker provides TNO1 curtain wall cleaning robot (bionic quadruped design, 50kg weight, crosses 200mm obstacles) for high-altitude facade cleaning.
  highlights:
    - Replaces human spider-man for high-altitude cleaning
    - "Crosses 200mm obstacles, adapts to most facade structures"
    - Cleaning speed adjustable 50-150mm/s
    - "Uses physical brushing, minimal cleaning agent"
zh:
  description: |
