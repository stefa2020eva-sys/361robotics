  description: |
    东莞星火齿轮生产微型动力传动系统，包括用于灵巧手的行星齿轮箱，集成无槽无刷电机、行星齿轮和具备自锁功能的蜗轮传动。
  highlights:
    - 国家级专精特新「小巨人」
