ru:
  description: |
    Xinghuo Gear выпускает микросистемы передачи мощности, включая планетарные редукторы для ловких манипуляторов: безпазовый бесколлекторный двигатель, планетарная передача и червячный привод с самоторможением.
  highlights:
    - Национальный «Маленький гигант»
    - Инженерный исследовательский центр провинции Гуандун
    - "Компактный дизайн, низкий шум, высокая точность"
    - "Применения: ловкие манипуляторы, медицинский захват, хирургические роботы, промышленные зажимы"
en:
  description: |
    Xinghuo Gear produces micro power transmission systems including planetary gearboxes for dexterous hands, combining coreless brushless motor, planetary gear, and worm gear drive with self-locking.
  highlights:
    - National Little Giant
    - Guangdong provincial engineering research center
    - "Compact design, low noise, high precision"
    - "Applications: dexterous hands, medical grasping, surgical robots, industrial clamping"
