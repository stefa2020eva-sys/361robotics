ru:
  description: |
    Ampron Technology (安培龙) производит датчики крутящего момента на кремниевых MEMS-тензорезисторах для определения моментов в суставах гуманоидных роботов,
    обеспечивая высокую точность, долговременную стабильность и возможности массового производства.
  highlights:
    - Государственный «Маленький гигант»
    - Единственный отечественный поставщик керамических конденсаторных датчиков давления с полным IC-стеком
    - Датчик момента — разрешение 0,01 % FS, нелинейность ±0,3 % FS
    - Поставщик автомобильных датчиков
en:
  description: |
    Ampron Technology produces silicon MEMS gauge torque sensors for humanoid robot joint torque detection, offering high accuracy, long-term stability, and mass production capability.
  highlights:
    - National Little Giant
    - Only domestic supplier of ceramic capacitance pressure sensor with full in-house IC
    - Torque sensor - resolution 0.01% FS, non-linearity ±0.3% FS
    - Automotive-grade sensor supplier
