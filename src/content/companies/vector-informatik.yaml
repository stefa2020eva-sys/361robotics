en:
  description: |
    Vector provides CANoe network simulation and testing platform supporting EtherCAT, CANopen, CAN, LIN, and Ethernet for robot control network development and system validation.
  highlights:
    - 30+ years of experience, 4500+ employees worldwide
    - CANoe supports node simulation, message analysis, automated testing
    - Widely used in automotive electronics
    - Now applied to robot control network debugging
