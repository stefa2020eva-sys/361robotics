ru:
  description: |
    Vector Informatik предоставляет платформу симуляции и тестирования сетей CANoe с поддержкой EtherCAT, CANopen, CAN, LIN и Ethernet
    для разработки и валидации сетей управления роботов.
  highlights:
    - 30+ лет опыта, 4500+ сотрудников по всему миру
    - CANoe — симуляция узлов, анализ сообщений, автоматизированное тестирование
