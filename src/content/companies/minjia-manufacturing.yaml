ru:
  description: |
    Minjia Manufacturing поставляет шлифовальные центры ЧПУ для внутренней резьбошлифовки (SMK304) и комплексной шлифовки наружной резьбы (SWM1503) для производства шарико-винтовых и ходовых винтов.
  highlights:
    - Высокая производительность и точность обработки
    - Поддержка производства ключевых компонентов роботов
    - Председательствующее предприятие Гуанчжоуской ассоциации станкостроения
    - Член совета Гуандунского центра инноваций ЧПУ высокого класса
en:
  description: |
    Minjia Manufacturing provides CNC grinding centers for internal thread grinding (SMK304) and external thread composite grinding (SWM1503) for producing ball screws and lead screws.
  highlights:
    - High-efficiency and high-precision machining
    - Supports robot core component manufacturing
    - Chairman unit of Guangzhou Machine Tool Association
    - Board member of Guangdong High-end CNC Innovation Center
