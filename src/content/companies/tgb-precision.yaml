    - Обслуживает полупроводники, медицину, 3C-оборудование
en:
  description: |
    TGB Precision produces planetary roller screws and miniature ball screws for high-end linear transmission in semiconductors, new energy, precision inspection, and robotics.
  highlights:
    - "Planetary roller screws: multi-tooth contact, high load, high rigidity, long life"
    - "Miniature ball screws: low friction, low noise, high positioning accuracy"
    - Customizable for heavy load and high precision
    - Serves semiconductor, medical, 3C equipment
