ru:
  description: |
    Creat Photoelectronic выпускает высокоточные оптические дисковые энкодеры и линейные шкалы
    (стеклянные и стеклокерамические серии LC-LE-G, серии LC-LE-S из нержавеющей стали) для энкодеров и систем управления движением.
  highlights:
    - Точность ширины линии ±0,5 мкм или ±1 мкм
    - Стеклокерамика — коэффициент расширения ±0,5×10⁻⁶/°C, длина до 1060 мм
    - Высокая отражательная способность >60 %, низкая отражательная способность <5 %
    - Серия из нержавеющей стали (304, 316, 431, 420)
en:
  description: |
    Creat Photoelectronic provides high-precision optical encoder disks and grating rulers (LC-LE-G series glass/glass-ceramic, LC-LE-S series stainless steel) for encoders and motion control.
  highlights:
    - Line width accuracy ±0.5μm or ±1μm
    - "Glass-ceramic: expansion coefficient ±0.5×10⁻⁶/°C, max length 1060mm"
    - High reflectivity >60%, low reflectivity <5%
    - Stainless steel series (304, 316, 431, 420)
