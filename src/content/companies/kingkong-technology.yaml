ru:
  description: |
    KingKong Technology (金钢科技) выпускает магнитные энкодеры с растровой схемой для интегрированных суставов роботов
    с двойным 24-битным абсолютным выходом, точностью ±0,01° и сверхкомпактной радиальной шириной всего 7 мм.
  highlights:
    - Двойной 24-битный абсолютный выход
    - Абсолютная точность позиционирования ±0,01°
    - Ширина кольца всего 7 мм, типоразмеры по диаметру с шагом 5 мм
    - Виброустойчивость, помехозащищённость, защита от пыли и масла
en:
  description: |
    KingKong Technology produces pattern-based magnetic encoders for robot integrated joints, featuring dual 24-bit absolute output, ±0.01° accuracy, and ultra-compact radial width of 7mm.
  highlights:
    - Dual 24-bit absolute output
    - ±0.01° absolute positioning accuracy
    - Ring width only 7mm, models every 5mm on diameter
    - Vibration resistant, anti-interference, dust/oil resistant
