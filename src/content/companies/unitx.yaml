en:
  description: |
    UnitX provides AI-based surface defect detection with the OptiX intelligent imaging system (2^32 lighting modes) and Cortex deep learning inference system.
  highlights:
    - "OptiX: 100x brighter than traditional light, 50 lighting modes/sec, 1.0 m/s flying speed"
    - "Cortex: train model with only 5 samples per defect type"
    - Pixel-level defect detection
    - Serves top 10 global automotive Tier 1 suppliers
zh:
  description: |
    个元科技提供基于 AI 的表面缺陷检测，包括 OptiX 智能成像系统（2^32 种照明模式）和 Cortex 深度学习推理系统。
  highlights:
