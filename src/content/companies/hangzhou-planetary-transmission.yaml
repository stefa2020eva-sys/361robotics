en:
  description: |
    Hangzhou Planetary Transmission produces precision planetary reducers, AGV/AMR drive systems, and humanoid robot joint modules with high rigidity, wear resistance, and low reduction ratios.
  highlights:
    - 15 invention patents, 30+ utility patents
    - Planetary reducers for mobile robot drive, lift, rotation
    - Joint modules for humanoid neck, shoulder, elbow, wrist, hip, knee, ankle
    - High flexibility and cost-effectiveness
