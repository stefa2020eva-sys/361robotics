en:
  description: |
    PMP Robotics provides one-stop embodied intelligence research platform based on Franka Research 3 robots, supporting both force control and position control teleoperation.
  highlights:
    - Team from Universal Robots, ABB, HIT Robotics Lab
    - Franka Research 3 - 1kHz real-time control, joint torque sensing
    - One-stop platform - no infrastructure setup needed
    - CEO was founding employee of UR China
