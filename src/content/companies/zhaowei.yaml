en:
  description: |
    ZHAOWEI produces ZWHAND-B06 dexterous hand with 6 active DOF (10 passive), 8N fingertip pressure, 400g weight, and integrated tactile sensors for robot end-effectors.
  highlights:
    - Listed A+H share (003021, 02692)
    - National Manufacturing Single Champion
    - 6 active DOF, 10 passive, 8N fingertip pressure
    - RS485/CANFD, 12-64VDC, 400g, tactile sensors
