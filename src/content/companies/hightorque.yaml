  description: 硬件（本体+执行器）：双足机器人Miniπ、人形机器人MiniHi、自研关节模组。软件：机器人本体研发、减速机、电机、FOC驱动、运动控制算法。方向：迷你人形机器人整机、关节模组及全套技术。 具备机器人本体研发、减速机、电机、驱动、运动控制算法等全套机器人技术，拥有全链研发架构和自有工厂。 为校企科研开发及工业产品应用提供可靠支持，旨在让每个开发者都有一台人形机器人。
