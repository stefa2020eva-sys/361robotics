zh:
  description: 硬件（本体+核心部件）：工业机器人、移动机器人、特种机器人、核心零部件。软件/方案：行业系统解决方案。方向：工业机器人整机、核心部件及智能制造解决方案。 书写了中国机器人发展史上百余项“行业首创”；以自主核心技术、核心零部件、核心产品为一体。 以智能制造为业务主攻方向，为产业升级提供全体系核心支撑，构建了健康科学可持续的产业体系。
  highlights:
