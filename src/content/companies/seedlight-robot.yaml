    - Взрывозащищённое исполнение для складских условий
en:
  description: |
    Seedlight Robot develops intelligent grain leveling robots in cooperation with Sinograin, featuring spiral drive, multi-modal perception, and autonomous inspection for grain storage.
  highlights:
    - Co-developed with Sinograin Chengdu Storage Research Institute
    - Intelligent grain leveling + autonomous inspection
    - Overcomes 98% of extreme curved surfaces
    - Explosion-proof design for storage environments
