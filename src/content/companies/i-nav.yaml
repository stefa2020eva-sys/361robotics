en:
  description: |
    I-NAV provides TLH-IMU-600M-31A MEMS inertial measurement unit (RS422) and IMU600M IMU with external GNSS support for autonomous driving, AGVs, robots, and vessels.
  highlights:
    - "World's only full-chain supplier of fiber optic gyros + MEMS hybrid inertial navigation"
    - "High precision, small size, light weight, low power"
    - Impact and vibration resistant
    - "Applications: UAVs, AGVs, autonomous driving, robots"
