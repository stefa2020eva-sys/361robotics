en:
  description: |
    Yunshaan Intelligence provides an unmanned equipment intelligent management and control platform for heterogeneous collaboration, cluster control, and human-machine interaction based on brain-edge-end architecture.
  highlights:
    - Founded spring 2024
    - Supports mixed drones, robots, UGVs, robot dogs
    - Real-time multimodal data acquisition
    - Target recognition, task decision, voice command
