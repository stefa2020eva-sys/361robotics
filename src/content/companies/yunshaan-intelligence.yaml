  description: |
    Yunshaan Intelligence предоставляет платформу интеллектуального управления беспилотным оборудованием с гетерогенным взаимодействием, кластерным управлением и человеко-машинным интерфейсом на основе архитектуры «мозг — край — устройство».
  highlights:
    - Основана весной 2024 года
    - Поддерживает смешанные группы дронов, роботов, беспилотных машин и робособак
