en:
  description: |
    TLI Bot (stock 835015) provides the T1Pro humanoid robot (71 DOF, 450Nm joint torque, 8km/h walking speed) and ultra-lightweight collaborative robots.
  highlights:
    - 71 active DOF, highest in world for full-size humanoid
    - Single-arm load 10kg, weighted squat >145kg
    - Joint angular velocity 720°/s, up to 900°/s
    - 50+ invention patents, 20+ humanoid-related; T1Pro used in research, defense, manufacturing, healthcare
