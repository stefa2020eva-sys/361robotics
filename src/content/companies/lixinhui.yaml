en:
  description: |
    LixinHui provides complete machine wiring harnesses and custom cable assemblies for new energy, industrial, and embodied robots, supporting power, signal, control, and data transmission.
  highlights:
    - 18 years experience, 300+ workers, factories in Dongguan and Suzhou
    - "Custom connectors: 2.54mm pitch, double row, reverse buckle, locking"
    - "Wire materials: PVC, XLPE, PU, TPE, silicone, PTFE"
    - Small-batch rapid prototyping, medium/large-batch delivery
