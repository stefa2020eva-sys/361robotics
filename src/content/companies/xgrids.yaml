en:
  description: |
    XGRIDS builds spatial intelligence platforms with 3D scanning and modeling products including the PortalCam spatial camera, Lixel L2Pro, and Lixel K1 handheld scanners.
  highlights:
    - SLAM + 3D Gaussian Splatting for real-time 3D reconstruction
    - "PortalCam: dual fisheye + dual front lenses, 360° capture"
    - "Lixel L2Pro: \"zero post-processing\" handheld scanner"
    - "Lixel K1: 1 kg portable scanner"
