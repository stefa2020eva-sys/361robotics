en:
  description: |
    Haptron Scientific provides Photon Finger Tip multi-axis haptic knuckle with miniature multi-axis force sensors and flexible electronics for humanoid robot tactile perception.
  highlights:
    - "World's smallest miniature multi-axis force sensor"
    - Combines skeletal muscle force perception + skin contact surface sensing
    - "Customizable knuckle appearance, modular design"
    - Consistent mass production
