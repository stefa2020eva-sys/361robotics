en:
  description: |
    Geliang Measurement & Control produces VGX series robot joint motor test systems for torque, speed, efficiency, temperature rise, and reliability testing up to 15,000 rpm and 50 N·m.
  highlights:
    - "Torque accuracy ±0.1% FS, speed accuracy ±0.1 rpm"
    - "Four-quadrant energy recovery ≥90%"
    - "Sampling frequency >1 kHz"
    - Supports step response, torque ripple, encoder signals
