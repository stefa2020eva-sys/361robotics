ru:
  description: |
    Shenzhen DX Intech Technology разрабатывает гуманоидных роботов, интегрируемых с системами общественного обслуживания.
    В соответствии с национальной стратегией «AI+» компания формирует демонстрационные сценарии,
    в которых гуманоидные роботы предоставляют эффективные, удобные и точные публичные услуги — создавая масштабируемые эталоны умного сервиса.
  highlights:
    - Соответствует национальной стратегии «AI+» для автоматизации публичных услуг
    - Гуманоидные роботы как ключевой носитель умных публичных сервисов
    - Тиражируемая демонстрационная модель внедрения интеллектуальных сервисов
en:
  description: |
    Shenzhen DX Intech Technology develops humanoid robots that integrate with public service systems.
    Aligned with the national "AI+" strategy, the company builds demonstration scenarios where humanoid robots deliver efficient, convenient, and precise public services — establishing scalable smart service benchmarks.
  highlights:
    - Aligned with the national "AI+" strategy for public-service automation
    - Humanoid robots as the core carrier of smart public services
    - Replicable demonstration model for intelligent service deployments
