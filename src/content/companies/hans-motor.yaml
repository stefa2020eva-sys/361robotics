ru:
  description: |
    Shenzhen Han's Motor S and T Co., Ltd. — лидер в области ключевых компонентов для роботов, поставляющий двигатели и приводные решения для робототехнической отрасли.
    Компания индивидуально разрабатывает решения по приводам и процессы производства для производителей роботов по всему миру.
    Расположена в индустриальном парке Han's Laser в районе Баоань, Шэньчжэнь.
  highlights:
    - Лидер в ключевых компонентах для роботов — индивидуальные решения по электроприводам
    - Надёжный консультант по ключевым компонентам для роботов
en:
  description: |
    Shenzhen Han's Motor S and T Co., Ltd. is a leader in robot core components, supplying motors and drive solutions for the robotics industry.
    The company customizes motor drive solutions and manufacturing processes for robot manufacturers worldwide.
    Located at Han's Laser Industrial Park in Bao'an District, Shenzhen.
  highlights:
    - Leader in robot core components, customizing motor drive solutions for robotics
    - Trusted consultant for robot core components
