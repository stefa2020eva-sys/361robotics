ru:
  description: |
    DINGS' Motion (鼎智科技) выпускает безпазовые бесколлекторные двигатели постоянного тока (6–42 мм, 12 типоразмеров) с удельной мощностью на 20% выше среднеотраслевой, максимальным КПД 91% и безрамными моментными двигателями для шарниров роботов.
  highlights:
    - Более 160 патентов, поставки в 50+ стран
    - Минимальный диаметр 6 мм — самый полный отечественный модельный ряд
    - Удельная мощность +20% к среднеотраслевой, КПД до 91%
    - Кастомизация с редукторами, энкодерами, ШВП
en:
  description: |
    DINGS' Motion produces slotless brushless DC motors (6-42mm, 12 sizes) with torque density 20% above industry average, max efficiency 91%, and frameless torque motors for robot joints.
  highlights:
    - 160+ patents, 50+ countries served
    - Minimum diameter 6mm, most complete domestic product range
    - Torque density +20% vs industry avg, efficiency up to 91%
    - Customizable with gearbox, encoder, screw assembly
