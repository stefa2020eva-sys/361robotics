ru:
  description: |
    LivSyn предлагает решение сбора данных от человека LivUMI (сверхлёгкое, миллиметровое позиционирование позы, миллисекундная синхронизация датчиков) и платформу данных LDP для тренировки воплощённого ИИ.
  highlights:
    - Команда основателей из Tsinghua
    - "LivUMI: высокая точность, сверхлёгкость"
    - Развёртывание в один клик с координацией ПО/ЖО
    - "Цепочка инструментов: сбор-обучение-развёртывание"
en:
  description: |
    LivSyn provides LivUMI human-centric data collection solution (ultra-lightweight, millimeter pose positioning, millisecond multi-sensor sync) and LDP data platform for embodied AI training.
  highlights:
    - 清华系 founding team
    - "LivUMI: high-precision ultra-lightweight"
    - One-click deployment software-hardware coordination
    - Collect-train-deploy toolchain
