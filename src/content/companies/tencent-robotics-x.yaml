ru:
  description: |
    Tencent Robotics X предлагает открытую платформу воплощённого ИИ TAIROS с моделью планирования, мультимодальной моделью восприятия и моделью «восприятие-действие» через стандартизированные API и SDK для роботов.
  highlights:
    - "Поддержка двуногих/колёсных гуманоидов, четвероногих и манипуляторов"
    - Облачное моделирование в один клик
    - "Платформа данных, инструменты разработчика, облачная инфраструктура"
    - "Применения в производстве, автопроме, бытовой технике"
en:
  description: |
    Tencent Robotics X provides TAIROS embodied AI open platform with planning large model, multimodal perception model, and perception-action model via standard APIs and SDKs for robots.
  highlights:
    - "Supports bipedal/wheeled humanoids, quadrupeds, robotic arms"
    - One-click cloud simulation environment
    - "Data platform, developer tools, cloud infrastructure"
    - "Industrial application in manufacturing, automotive, home appliances"
zh:
  description: |
    腾讯 Robotics X 提供 TAIROS 具身智能开放平台，包含规划大模型、多模态感知模型和感知-动作模型，通过标准 API 和 SDK 服务机器人。
  highlights:
    - 支持双足/轮式人形、四足、机械臂
    - 一键云端仿真环境
    - 数据平台、开发者工具、云基础设施
    - 应用于制造、汽车、家电
