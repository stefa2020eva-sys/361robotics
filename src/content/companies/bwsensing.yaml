ru:
  description: |
    BWSENSING (北微传感) производит высокоточные AHRS-датчики (DMC620, DMC640) для гуманоидных роботов
    на базе MEMS-гироскопов тактического класса, с помехоустойчивыми алгоритмами и IAP-обновлением «по воздуху».
  highlights:
    - «Маленький гигант», двукратный лауреат золотой награды World IoT Expo
    - DMC620 — тройные одноосные QMEMS-гироскопы, самокалибровка
    - DMC640 — промышленный класс, экономичный, поддержка IAP
    - Более 100 прав на интеллектуальную собственность
en:
  description: |
    BWSENSING produces high-precision AHRS sensors (DMC620, DMC640) for humanoid robots, featuring tactical-grade MEMS gyros, anti-interference algorithms, and IAP online upgrade.
  highlights:
    - National Little Giant, 2x World IoT Expo Gold Award
    - DMC620 - triple QMEMS single-axis gyros, self-calibration
    - DMC640 - industrial-grade, cost-effective, IAP support
    - 100+ IP rights
