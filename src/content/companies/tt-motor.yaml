en:
  description: |
    TT Motor provides GMP12-TBC1220-MR coreless planetary gear motor (12mm diameter, 0.2Nm rated torque, 0.4Nm peak) with high-precision encoder for dexterous hands.
  highlights:
    - "12mm diameter, rated 0.2Nm, peak >0.4Nm"
