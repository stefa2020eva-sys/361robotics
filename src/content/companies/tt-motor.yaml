    TT Motor выпускает коретекстусные планетарные мотор-редукторы GMP12-TBC1220-MR (диаметр 12 мм, номинальный момент 0,2 Н·м, пик 0,4 Н·м) с высокоточным энкодером для ловких манипуляторов.
