    Limx Dynamics создаёт полноразмерных гуманоидных роботов общего назначения с ИИ-управлением (Oli, 165 см, 31 степень свободы) и модульного многоформатного робота TRON 2 со сменной двурукой, двуногой или колёсной конфигурацией.
