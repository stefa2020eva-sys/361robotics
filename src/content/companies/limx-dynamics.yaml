en:
  description: |
    Limx Dynamics builds AI-driven full-size general-purpose humanoid robots (Oli, 165cm, 31 DoF) and the modular multi-form robot TRON 2 with interchangeable dual-arm, bipedal, or wheeled configurations.
  highlights:
    - 'Oli: 31 degrees of freedom, human-like posture'
    - 'TRON 2: modular arms/legs/wheels'
    - Limx COSA agentic OS
    - Supports voice, vision, and perception add-ons
