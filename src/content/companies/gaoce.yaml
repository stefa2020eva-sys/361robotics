en:
  description: |
    Gaoce provides composite metal tendon ropes (tungsten) for dexterous hands with small bending radius, wear resistance, fatigue resistance, and anti-slip performance for humanoid robots.
  highlights:
    - Listed on SSE STAR Market (688556)
    - Self-developed coating for tungsten tendon rope
    - "Small bending radius, wear resistant, fatigue resistant"
    - Customizable properties
