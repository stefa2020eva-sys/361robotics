ru:
  description: |
    Qianxiao Electronics производит мини-модули беспроводной ad-hoc сети SDR (QS010B-K) для связи дронов и роботов с децентрализованной многохопной mesh-сетью.
  highlights:
    - Поддержка точка-многоточка, цепная ретрансляция, mesh, гибридные топологии
