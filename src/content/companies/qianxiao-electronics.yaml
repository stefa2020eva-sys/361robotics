    - Application CPU SDK для видеокодирования, управления, ИИ
en:
  description: |
    Qianxiao Electronics produces SDR wireless ad-hoc networking mini modules (QS010B-K) for drone and robot communication with decentralized multi-hop mesh networking.
  highlights:
    - Supports point-to-multipoint, chain relay, mesh, hybrid topologies
    - SBUS, RS232, TTL, audio interfaces
    - External 5G module expansion
    - Application CPU SDK for video encoding, control, AI
