ru:
  description: |
    Woer выпускает кабельные жгуты для интеллектуальных роботов с высоким ресурсом гибки (5–10 млн+ циклов),
    двухслойным экранированием (алюминиевая фольга + лужёная медная оплётка) и эксплуатацией от −40 °C до +105 °C.
  highlights:
    - Проводник — ультратонкая голая/лужёная медь 0,05–0,10 мм
    - Динамический радиус изгиба 7,5–10×OD
    - Покрытие экраном >90 %, двухслойное
    - Импеданс 100±15 Ом для EtherCAT/PROFINET; акции 002130
en:
  description: |
    Woer provides intelligent robot cable harnesses with high bending life (5-10M+ cycles), double-layer shielding (aluminum foil + tinned copper braid), and -40°C to +105°C operation.
  highlights:
    - "Conductor: 0.05-0.10mm ultra-fine bare/tinned copper"
    - Dynamic bending radius 7.5-10×OD
    - Shielding coverage >90%, double-layer
    - Impedance 100±15Ω for EtherCAT/PROFINET; stock 002130
