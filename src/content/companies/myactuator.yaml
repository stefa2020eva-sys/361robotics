ru:
  description: |
    MYACTUATOR (Suzhou Micro Actuator) предоставляет микросистемы силовой передачи для воплощённых роботов, включая планетарные, волновые, полые прямодействующие, циклоидные модули и безрамные моментные двигатели.
  highlights:
    - Полная собственная разработка по всей цепочке отрасли
    - Экстремальное соотношение цена/производительность
    - Модульный дизайн для быстрой поставки
    - Решения «под ключ» для гуманоидов, медицины, агротехнологий
en:
  description: |
    MYACTUATOR (Suzhou Micro Actuator) provides micro power system solutions for embodied robots including planetary, harmonic, hollow direct-drive, cycloidal modules, and frameless torque motors.
  highlights:
    - "Full-stack in-house R&D across the entire industry chain"
    - Extreme cost-performance ratio
    - Modular design for rapid delivery
    - "\"Turnkey\" solutions for humanoid, medical, agriculture"
