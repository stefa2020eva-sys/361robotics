ru:
  description: |
    Zhaoheng Group (兆恒集团) производит прецизионные конструктивные компоненты для суставов, корпусов и рам гуманоидных роботов,
    используя пятиосевую обработку ЧПУ, достигая точности IT6 и шероховатости Ra0,4.
  highlights:
    - 350+ высокоточных станков ЧПУ из Германии/Швейцарии/Японии
    - Допуски IT6 (±0,005 мм), шероховатость Ra0,4
    - "Сплавы авиационного класса: алюминий, магний, титан"
    - Полный цикл от прототипа до серии
en:
  description: |
    Zhaoheng Group provides precision structural components for humanoid robot joints, frames, and housings using 5-axis CNC machining, achieving IT6 precision and Ra0.4 surface finish.
  highlights:
    - 350+ high-end CNC machines from Germany/Switzerland/Japan
    - IT6 tolerance (±0.005mm), Ra0.4 surface finish
    - Aerospace-grade aluminum, magnesium, titanium alloys
    - One-stop from prototyping to mass production
