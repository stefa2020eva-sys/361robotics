en:
  description: |
    Hekon Information is an authorized Livox distributor offering Mid-360S (360° 3D LiDAR, 0.05-50m range, 10cm blind zone) and Mid-70 (70.4° FOV, 5cm blind zone) for mobile robots.
  highlights:
    - "Mid-360S: 360° horizontal, 10-60° vertical, >200kHz sampling"
    - "Mid-70: 70.4° circular FOV, 5cm blind spot"
