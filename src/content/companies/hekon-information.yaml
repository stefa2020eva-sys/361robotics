    Hekon Information — авторизованный дистрибьютор Livox, предлагающий Mid-360S (360° 3D-лидар, диапазон 0,05–50 м, мёртвая зона 10 см) и Mid-70 (поле обзора 70,4°, мёртвая зона 5 см) для мобильных роботов.
