en:
  description: |
    Keli Sensing produces six-axis force/torque sensors (KL6E-C50-B series) using high-precision resistance strain gauge technology with high accuracy, anti-eccentric load, and mature mass production.
  highlights:
    - Listed company (603662), 30 years in weighing
    - High speed digital communication
    - Vertically integrated supply chain, high cost-performance
    - Force control for industrial, commercial, humanoid robots
