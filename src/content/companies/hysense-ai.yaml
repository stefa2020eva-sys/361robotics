en:
  description: |
    Hysense.ai develops fingertip tactile sensors with 99.8% accuracy and 99% consistency, using low-drift pressure ink and multi-physics fusion technology.
  highlights:
    - "Force accuracy error <0.2%, resolution 0.01N"
    - 10×16 dot matrix (customizable)
    - Digital output SPI/CAN FD
    - Half the cost of comparable products
