en:
  description: |
    DeepMirror, with its LooperRobotics brand, provides spatial intelligence solutions including visual navigation, environment understanding, and 3D reconstruction modules, as well as quadruped and humanoid robots.
  highlights:
    - First spatial intelligence company in China
    - Insight 9 spatial AI camera with on-device VSLAM
    - Ranger quadruped and NOMAD humanoid robots
    - Plug-and-play SDK for navigation and control
