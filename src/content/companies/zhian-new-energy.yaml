    - "Активная безопасность: детектирование утечек ячеек и K-значения"
en:
  description: |
    ZhiAn New Energy provides smart batteries and chargers for drones, EVTOLs, microcars, robots, and underwater robots with hot-swap uninterrupted power supply and high energy density.
  highlights:
    - Core team from DJI and CATL
    - Hot-swap uninterrupted power supply
    - High charge/discharge rate, lifecycle data storage
    - Active safety - cell leakage detection, K-value detection
