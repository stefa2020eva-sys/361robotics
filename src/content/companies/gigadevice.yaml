    - До 3840 КБ Flash, 1024 КБ SRAM
en:
  description: |
    GigaDevice provides GD32H75E series industrial automation MCUs with EtherCAT slave controller, 600MHz Cortex-M7 core, DSP+FPU, and up to 3840KB Flash.
  highlights:
    - World #2 in SPI NOR Flash
    - GD32H75E - 600MHz, 1552 DMIPS, CoreMark 2888
