ru:
  description: |
    GigaDevice (兆易创新) предоставляет MCU серии GD32H75E для промышленной автоматизации
    со встроенным EtherCAT-контроллером Slave, ядром Cortex-M7 600 МГц, DSP+FPU и Flash до 3840 КБ.
  highlights:
    - №2 в мире по SPI NOR Flash
    - GD32H75E — 600 МГц, 1552 DMIPS, CoreMark 2888
