ru:
  description: |
    Alibaba DAMO Academy (达摩院) представляет платформу воплощённого ИИ RynnBot — площадку для обучения и практики с роботами с нулевым порогом входа,
    а также SDK RynnRCP, обеспечивающий сквозной конвейер: от данных датчиков до инференса модели и исполнения действий.
  highlights:
    - Платформа воплощённого ИИ RynnBot
    - Разработка роботов «с нуля»
    - "Полная прозрачность пайплайна: датчик → модель → действие"
    - Поддержка лёгкой миграции технологий
en:
  description: |
    Alibaba DAMO Academy provides the RynnBot embodied AI platform, a zero-threshold robot teaching and practice platform with RynnRCP SDK for full pipeline from sensor data to model inference to action execution.
  highlights:
    - RynnBot Embodied AI Platform
    - Zero-threshold robot development
    - Full pipeline visibility - sensor to model to action
    - Supports easy technology migration
