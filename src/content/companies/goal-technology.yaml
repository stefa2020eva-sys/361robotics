en:
  description: |
    Goal Technology develops the Goal Tech industrial-grade automated robot with macro-micro integrated motion, micron-level precision, millisecond response, and 0.1N force control for 3C manufacturing.
  highlights:
    - Macro-micro integration for wide coverage and fine operation
    - 8+2 extendable DOF per arm
    - Micron precision, millisecond response, XYZR multi-dimensional force control
    - Quick-change multifunctional end effectors
