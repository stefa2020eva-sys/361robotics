    Goal Technology разрабатывает промышленный автоматизированный робот Goal Tech с макро-микро интегрированным движением,
    микронной точностью, миллисекундным откликом и силовым управлением 0,1 Н для производства 3C-продукции.
  highlights:
    - Макро-микро интеграция для широкого охвата и точной операции
    - 8+2 расширяемых степеней свободы на руку
