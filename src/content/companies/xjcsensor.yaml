    - Серийный выпуск малых партий уже освоен
    - 500+ публичных компаний в числе клиентов
en:
  description: |
    XJCSENSOR produces six-axis force/torque sensors based on micro-MEMS strain gauge technology with long-term stability, high sensitivity, low zero drift, and automated production.
  highlights:
    - National Little Giant, 16 years in force sensing
    - MEMS six-axis sensor expected to replace metal strain gauge
    - Small batch trial production completed
    - 500+ listed company clients
