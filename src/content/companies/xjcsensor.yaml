ru:
  description: |
    XJCSENSOR (鑫精诚传感) выпускает шестиосевые датчики силы/момента на основе микро-MEMS тензорезисторов
    с долговременной стабильностью, высокой чувствительностью, низким дрейфом нуля и автоматизированным производством.
  highlights:
    - Государственный «Маленький гигант», 16 лет в области датчиков силы
