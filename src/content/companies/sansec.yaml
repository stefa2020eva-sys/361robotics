  description: |
    三未信安科技股份有限公司（Sansec）为人形机器人、无人机和无人车辆提供全链路安全解决方案，包括硬件信任根、数字身份、密钥管理和后量子密码。
  highlights:
    - 100 余项发明专利，700 余项软件著作权
