ru:
  description: |
    Sansec предоставляет комплексные решения по информационной безопасности для гуманоидных роботов, дронов и беспилотных машин, включая аппаратный корень доверия, цифровую идентификацию, управление ключами и постквантовую криптографию.
  highlights:
    - 100+ изобретательских патентов, 700+ регистраций программ
    - Облачный HSM — 400 тыс. подписей/с, шифрование 8500 Мбит/с
