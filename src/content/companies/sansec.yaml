en:
  description: |
    Sansec provides full-link security solutions for humanoid robots, drones, and unmanned vehicles, including hardware root of trust, digital identity, key management, and post-quantum cryptography.
  highlights:
    - 100+ invention patents, 700+ software copyrights
    - 'Cloud HSM: 400k signatures/sec, 8500 Mbps encryption'
    - 'XT200 security chip: 10k signatures/sec, 100 Mbps'
    - Supports PQC algorithms
