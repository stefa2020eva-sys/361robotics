en:
  description: |
    Lyric Robot provides full-process manufacturing capabilities for mass production of embodied robots, including precision machining, assembly, testing, and application scenario development.
  highlights:
    - Listed on SSE Star Market (688499)
    - 400,000 m² intelligent manufacturing base
    - OEM services for humanoid robot arms, torsos, connectors, dexterous hands, PCBs, joint modules
    - Thousands of smart manufacturing equipment experiences for training scenarios
