ru:
  description: |
    Lyric Robot (利元亨) предоставляет полный цикл производственных возможностей для массового выпуска воплощённых роботов:
    прецизионную обработку, сборку, тестирование и развитие сценариев применения.
  highlights:
    - Зарегистрирована на SSE Star Market (688499)
    - 400 000 м² интеллектуальной производственной базы
    - OEM для рук, корпусов, разъёмов, ловких кистей, ПП, модулей суставов гуманоидных роботов
