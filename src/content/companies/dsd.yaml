    DSD выпускает прецизионные шестерни (модуль 0,2–2,0, ISO 5), миниатюрные винты с ходом (диаметр 1–12 мм, шаг 0,5–12 мм), червячные передачи и валы для шарниров роботов и ловких манипуляторов.
