en:
  description: |
    DSD produces precision gears (module 0.2-2.0, ISO grade 5), micro lead screws (diameter 1-12mm, lead 0.5-12mm), worm gears, and shafts for robot joints and dexterous hands.
  highlights:
    - "6000㎡ factory, Japanese gear hobbing machines"
    - "Gear precision: ISO5, JGMA1, AGMA12, DIN5"
    - "High speed, long life, low noise"
    - IATF16949 certified
