zh:
  description: 硬件（本体+核心部件）：超轻量仿人机械臂，自研控制器、驱动器、电机、谐波减速器。方向：轻量型机械臂整机及核心零部件。 实现从基因层面进行机械臂原型设计和底层零部件自主研发，在四大核心部件上取得革命性突破。 致力于打造智能、易用、可靠、通用的机器人，走入千行百业。已实现业绩快速增长，具备规模化产能。
