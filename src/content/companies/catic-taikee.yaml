en:
  description: |
    CATIC TAIKEE provides ZHROB-MA-1 air duct cleaning robot and ZHROB-MB-1 confined space inspection robot for HVAC systems in subways and infrastructure.
  highlights:
    - Strategic partnership with Northwestern Polytechnical University
    - "ZHROB-MA-1: adaptive cleaning arm, high-speed roller brush, vacuum suction"
    - "ZHROB-MB-1: AI anomaly detection (damage, water, rust, foreign objects)"
    - "Deployed in Shenzhen Metro, Wuhan Metro"
