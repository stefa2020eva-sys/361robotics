en:
  description: |
    Wenqing Intelligent Control provides intelligent liquid cooling modules for humanoid and quadruped robots, including T-Box integrated cooling terminals, micro-channel cold plates, and flexible piping.
  highlights:
    - 600W max heat transfer power
    - Automotive-grade lightweight electronic pump, multi-port valve
    - IP67 protection
    - Supports embedded or contact cold plates for joints, chips, domain controllers, batteries
