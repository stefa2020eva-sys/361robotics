  description: |
    Wenqing Intelligent Control поставляет интеллектуальные модули жидкостного охлаждения для гуманоидных и четвероногих роботов, включая интегрированные охлаждающие терминалы T-Box, микроканальные холодные плиты и гибкую трубопроводную систему.
  highlights:
    - Максимальная тепловая мощность 600 Вт
    - Автомобильный лёгкий электронный насос, многопортовый клапан
    - Защита IP67
