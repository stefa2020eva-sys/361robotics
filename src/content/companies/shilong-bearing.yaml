en:
  description: |
    Shilong Bearing produces thin-wall deep groove ball bearings and flexible bearings for robot joints, with monthly capacity of 12 million sets and annual output over 100 million sets.
  highlights:
    - ISO9001, IATF16949, ISO14001 certified
    - Annual output 120 million sets, value ~290 million RMB
    - Products - 67, 68, 69, MR, 1600 series thin-wall bearings
    - Serves robots, power tools, drones, encoders, appliances
