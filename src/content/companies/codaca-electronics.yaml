ru:
  description: |
    Codaca Electronics — глобальный поставщик магнитных компонентов, специализирующийся на сильноточных силовых индуктивностях, формованных силовых дросселях и синфазных дросселях для промышленных, автомобильных и ИИ-приложений.
  highlights:
    - Лаборатория с аккредитацией CNAS
    - Серия CPEX с малыми потерями на металлическом магнитопорошковом сердечнике
    - Серия CSBA — компактные, совместимые с GaN индуктивности
    - Серия CSAB — формованные силовые дроссели с магнитным экраном
en:
  description: |
    Codaca Electronics is a global supplier of magnetic components, specializing in high-current power inductors, molded power chokes, and common mode chokes for industrial, automotive, and AI applications.
  highlights:
    - CNAS-accredited lab
    - CPEX series low-loss metal magnetic powder core
    - CSBA series compact, GaN-compatible inductors
    - CSAB series molded power chokes with magnetic shielding
