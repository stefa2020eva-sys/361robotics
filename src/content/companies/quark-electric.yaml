ru:
  description: |
    Quark Electric специализируется на высокомоментных шарнирных модулях и тяжёлых четвероногих платформах для промышленных инспекций и специальных операций, с двигателями осевого потока и исполнениями IP67/взрывозащищённых.
  highlights:
    - Пиковый крутящий момент 450 Н·м на шарнир
    - Точность редуктора до 1 угловой минуты, шум всего 50 дБ
    - Защита IP68 и взрывозащищённое исполнение EX d II BT4
    - Более 100 комбинаций шарнирных модулей
en:
  description: |
    Quark Electric focuses on high-torque joint modules and heavy-duty quadruped platforms for industrial inspection and special operations, featuring axial flux motors and IP67/explosion-proof designs.
  highlights:
    - Peak torque 450 Nm per joint
    - Reducer accuracy up to 1 arcmin, noise as low as 50 dB
    - IP68 and EX d II BT4 explosion-proof option
    - Over 100 combinations of joint modules
