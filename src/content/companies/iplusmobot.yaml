ru:
  description: |
    IPLUSMOBOT выпускает серию автономных мобильных роботов EMMA (грузоподъёмность 400–2000 кг) с лазерной SLAM-навигацией, слиянием данных машинного зрения и IMU, точностью позиционирования ±2 мм и автономностью не менее 8 часов для умного производства.
