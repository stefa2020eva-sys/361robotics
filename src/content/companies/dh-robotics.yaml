    DH-Robotics производит сервоэлектрические захваты, актуаторы с подвижной катушкой, сервоэлектрические цилиндры, ловкие манипуляторы и систему интеллектуального гибкого движения IFM для отраслей 3C, новой энергетики и полупроводников.
