en:
  description: |
    DH-Robotics produces servo electric grippers, voice coil actuators, servo electric cylinders, dexterous hands, and the IFM intelligent flexible motion system for 3C, new energy, and semiconductor industries.
  highlights:
    - 200+ product portfolio
    - 12 series, 30+ gripper models
    - High force control precision and repeatability
    - Fills domestic precision actuator gaps
