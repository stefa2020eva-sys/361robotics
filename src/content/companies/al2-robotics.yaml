    Al² Robotics (Zhipingfang) produces AlphaBot 2, a general-purpose intelligent humanoid robot with spatial intelligence, learning capabilities, and applications in automotive, semiconductor, biotech, and public services.
  highlights:
    - AGI-native, productivity-type humanoid robot
    - AlphaBrain embodied foundation model
    - Deployed in semiconductor manufacturing, automotive, electronics, biotech
    - Data closed-loop + scenario compounding
