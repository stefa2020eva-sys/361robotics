ru:
  description: |
    Laimu Electronics поставляет разъёмы и кабельные сборки для робототехники, включая жгуты Mini-FAKRA с импедансом 50 Ом и частотой от DC до 15 ГГц для бинокулярного блока головы.
  highlights:
    - "Mini-FAKRA на 80% меньше традиционного FAKRA"
    - Самозапирающийся механизм push-pull
    - Усилие вставки ≤45 Н, извлечения ≥5 Н, удержание защёлки ≥110 Н
    - RG174 с посеребрённой медной жилой, потери 0,28 дБ/м на 1 ГГц
en:
  description: |
    Laimu Electronics provides connectors and cable assemblies for robotics, including Mini-FAKRA head binocular harnesses with 50Ω impedance and DC to 15 GHz frequency.
  highlights:
    - "Mini-FAKRA 80% smaller than traditional FAKRA"
    - Push-pull self-locking mechanism
    - Insertion force ≤45N, extraction force ≥5N, latch retention ≥110N
    - RG174 with silver-plated copper core, 0.28 dB/m loss at 1 GHz
