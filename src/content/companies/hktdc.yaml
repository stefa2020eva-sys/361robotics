zh:
  description: 服务/平台：贸易促进机构，举办国际展览会、会议，提供市场分析和产品资讯。方向：机器人产业的国际商贸推广与对接平台。 法定机构，在世界各地设有51个办事处，致力于推广香港作为双向环球投资及商业枢纽。 通过举办活动、研究报告和数码资讯平台，为企业（尤其是中小企）开拓内地和环球市场的机遇。
  highlights:
  - 服务/平台：贸易促进机构，举办国际展览会、会议，提供市场分析和产品资讯
  - 方向：机器人产业的国际商贸推广与对接平台
  - 法定机构，在世界各地设有51个办事处，致力于推广香港作为双向环球投资及商业枢纽
  - 通过举办活动、研究报告和数码资讯平台，为企业（尤其是中小企）开拓内地和环球市场的机遇
