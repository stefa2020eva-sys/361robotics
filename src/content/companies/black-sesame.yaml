ru:
  description: Black Sesame Technologies — китайский производитель полупроводников с подразделениями в Шанхае и Ухане. Поставляет автомобильные SoC серий Huashan и Wudang, расширяет применение на «мозги» гуманоидных роботов; компания вышла на гонконгскую биржу в 2024 году.
  highlights:
