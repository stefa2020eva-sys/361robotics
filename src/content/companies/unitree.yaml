    Unitree (宇树科技) выпускает гуманоидного робота G1 (130 см, 35 кг, 23–43 DOF, 2 м/с рысь)
    и четвероногого робота Go2 с 4D LiDAR, обучением с подкреплением и моментом в суставе 45 Н·м.
  highlights:
    - G1 — прыжок в длину 1,4 м, динамическая стойка, посадка
