en:
  description: |
    Unitree produces the G1 humanoid robot (130cm, 35kg, 23-43 DOF, 2m/s trot speed) and Go2 quadruped robot with 4D LiDAR, reinforcement learning, and 45Nm joint torque.
  highlights:
    - G1 - can perform standing long jump 1.4m, dynamic standing, sitting
    - Go2 - 360°×90° LiDAR perception, 45Nm joint torque
    - 2021/2025 CCTV Spring Festival Gala, 2022 Winter Olympics, 2023 Super Bowl
    - 200+ patents, 180+ granted
