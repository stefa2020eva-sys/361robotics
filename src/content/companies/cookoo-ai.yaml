ru:
  description: |
    CookooAI предоставляет системы ИИ-управления, включая центральные контроллеры XCU-AI, контроллеры хранения данных DSU-AI и облачно-граничные алгоритмические платформы ASS-AI для беспилотных машин и роботов.
  highlights:
    - Платформа AWS на базе Rockchip RK3588 (6 TOPS NPU)
    - AWU402 на базе NVIDIA Orin NX/Nano (20–100 TOPS)
    - AWU406 на базе NVIDIA AGX Orin (200–275 TOPS)
    - Высокоточная интегрированная инерциальная навигация
en:
  description: |
    CookooAI provides AI control systems including XCU-AI central controllers, DSU-AI data storage controllers, and ASS-AI cloud-to-end algorithm platforms for unmanned vehicles and robots.
  highlights:
    - AWS platform based on Rockchip RK3588 (6 TOPS NPU)
    - AWU402 based on NVIDIA Orin NX/Nano (20-100 TOPS)
    - AWU406 based on NVIDIA AGX Orin (200-275 TOPS)
    - High-precision integrated inertial navigation
