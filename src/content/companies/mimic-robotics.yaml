    - Интуитивно обучается у человека-оператора
en:
  description: |
    Mimic Robotics develops a scalable dexterous manipulation model and a robotic hand hardware with 21 joints, 7kg payload, and ±0.5mm fingertip precision for manufacturing and logistics.
  highlights:
    - Robotic hand - 21 joints, 7kg payload, ±0.5mm precision
    - Scalable model recipe for dexterity
    - Same algorithm scales to any use case
    - Learns intuitively from human operators
