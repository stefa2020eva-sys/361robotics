ru:
  description: |
    Prhldom AI предлагает безмаркерную технологию захвата движений Motion IQ с медицинской точностью (10–15 мм)
    для обучения алгоритмов движения роботов, снижая стоимость на 90 % по сравнению с маркерным Mocap.
  highlights:
    - Первая в мире безмаркерная система с медицинской точностью
    - Обучена на 20+ млн точек данных движений человека
    - Покрывает почти 100 степеней свободы без пропущенных точек
    - На 95 % меньше времени операций и >90 % экономии CapEx/OpEx
en:
  description: |
    Prhldom AI provides markerless motion capture technology (Motion IQ) with medical-grade precision (10-15mm) for robot motion algorithm training, reducing cost by 90% compared to marker-based Mocap.
  highlights:
    - World's first markerless motion capture with medical-grade precision
    - Trained on 20M+ human motion data points
    - Covers nearly 100 DOF, no missing points
    - 95% less operation time, >90% CapEx/OpEx savings
