en:
  description: |
    Baron Bearing manufactures precision thin-wall bearings, stainless steel thin-wall bearings, and four-point contact ball bearings for robot fingers, elbows, shoulders, and hips.
  highlights:
    - Ultra-thin wall saves joint space
    - Stainless steel offers corrosion and low-temperature resistance
    - Four-point contact handles bi-directional loads
    - Zero backlash for precise positioning
