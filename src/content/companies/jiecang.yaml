ru:
  description: |
    Jiecang (603583.SH) предлагает полноценные решения по приведению в движение, включая колонны подъёма, узлы бескорпусных двигателей (Φ8–12 мм), поворотные модули (волновые/планетарные/циклоидные) и линейные приводы.
  highlights:
    - Волновой модуль с точностью ±10 угл. сек.
    - Планетарный модуль с высокой удельной моментной плотностью
    - "Циклоидный модуль на 35% легче и на 10 дБ тише"
    - Линейные приводы с макс. толчком до 8000 Н
en:
  description: |
    Jiecang (603583.SH) provides full-stack actuation solutions including lifting columns, coreless motor assemblies (Φ8-12mm), rotary modules (harmonic/planetary/cycloidal), and linear actuators.
  highlights:
    - Harmonic module ±10 arcsec precision
    - Planetary module high torque density
    - "Cycloidal module 35% lighter, 10dB quieter"
    - Linear actuators up to 8000N max thrust
