ru:
  description: |
    Intedigo предлагает модуль связи для телеоперации RoBOX (Rockchip RK3588, NPU 5–6 TOPS) с собственным протоколом RoHIL ультра-низкой задержки для удалённого управления гуманоидными роботами.
  highlights:
    - Собственный RoHIL — сверхнизкая задержка мультимодальной связи
    - "RK3588/RK3582, 5–6 TOPS NPU"
    - "3×GbE/2.5G, 5×USB Type-C 3.0, Wi-Fi 6/7, 4G/5G"
    - "Кодирование 4×1080p@60fps или 4K@60fps"
en:
  description: |
    Intedigo provides RoBOX teleoperation communication module (Rockchip RK3588, 5-6 TOPS NPU) with RoHIL low-latency protocol for humanoid robot remote operation.
  highlights:
    - Proprietary RoHIL ultra-low latency multimodal communication
    - "RK3588/RK3582, 5-6 TOPS NPU"
    - "3×GbE/2.5G, 5×USB Type-C 3.0, Wi-Fi 6/7, 4G/5G"
    - "Supports 4×1080p@60fps or 4K@60fps encoding"
