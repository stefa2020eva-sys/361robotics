    毫米级定位以及 <30ms 延迟，服务于具身智能数据采集。
  highlights:
    - 亚微秒级硬件同步，毫米级绝对定位
    - 动作延迟 <30ms，端到端 <100ms
    - 16–20 自由度，支持抓取、搬运、接触富任务
    - 服务科研院所与数据采集中心
