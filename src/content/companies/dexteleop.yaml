ru:
  description: |
    Dexteleop Intelligence предоставляет серию телеуправляемых роботов TA (16–20 степеней свободы) с субмикросекундной аппаратной синхронизацией,
    миллиметровым позиционированием и задержкой <30 мс для сбора данных для воплощённого ИИ.
  highlights:
    - Аппаратная синхронизация субмикросекундного уровня, абсолютное позиционирование с точностью миллиметр
    - Задержка движений <30 мс, glass-to-glass <100 мс
    - 16–20 степеней свободы, поддержка захвата, переноса, контактных задач
    - Обслуживает научно-исследовательские учреждения и центры сбора данных
en:
  description: |
    Dexteleop Intelligence provides TA series teleoperation robots (16-20 DOF) with sub-microsecond hardware sync, millimeter positioning, and <30ms latency for embodied AI data collection.
  highlights:
    - Sub-microsecond hardware synchronization, millimeter-level absolute positioning
    - Motion latency <30ms, glass-to-glass <100ms
    - 16-20 DOF, supports grasping, handling, contact-rich tasks
    - Serves research institutions, data collection centers
zh:
  description: |
