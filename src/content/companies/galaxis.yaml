ru:
  description: |
    Galaxis (凯乐士科技) предоставляет роботов для внутрицеховой логистики, включая узкопроходные вилочные AMR серии VFR
    грузоподъёмностью 600–1000 кг, с точностью остановки ±5 мм и навигацией по QR-кодам/SLAM.
  highlights:
    - "Полный набор: MSR, AMR, CSR для хранения, сортировки, перевозки"
    - Серия VFR — боковой захват вил, высота подъёма до 2000 мм
    - Собственный вес 800–1500 кг, радиус разворота 925–930 мм
    - Применения в распределительных и складских центрах
en:
  description: |
    Galaxis provides intralogistics robots including VFR very narrow aisle fork-type AMRs with 600-1000kg load, ±5mm stopping accuracy, and QR code/SLAM navigation.
  highlights:
    - Full suite - MSR, AMR, CSR for storage, sorting, transport
    - VFR series - side-facing fork pickup, lifting height up to 2000mm
    - 800-1500kg self-weight, 925-930mm turn radius
    - Serves warehousing and distribution centers
