ru:
  description: |
    Sensing Tech предоставляет решения машинного зрения для воплощённой робототехники на NVIDIA Jetson AGX Thor, включая комплект разработчика TRD1 G2A с поддержкой до 8 GMSL-камер.
  highlights:
    - Поддержка 8 GMSL-камер с синхронным запуском
    - Макс. разрешение 3840x2160, вывод RAW/YUV422
    - NVIDIA Jetson AGX Thor с 2070 TFLOPS
    - Официальный партнёр NVIDIA по машинному зрению для роботов
en:
  description: |
    Sensing Tech provides embodied robotics vision solutions based on NVIDIA Jetson AGX Thor, with the TRD1 G2A development kit supporting up to 8 GMSL cameras.
  highlights:
    - Supports 8x GMSL cameras with synchronous triggering
    - Max resolution 3840x2160, RAW/YUV422 output
    - NVIDIA Jetson AGX Thor with 2070 TFLOPS
    - Official NVIDIA robot vision partner
