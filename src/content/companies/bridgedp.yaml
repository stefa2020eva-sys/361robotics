ru:
  description: |
    BridgeDP поставляет решения управления движением (всенаправленное передвижение и подражание движениям всего тела) и платформу разработки движений без кода BridgeDP Engine для гуманоидных и четвероногих роботов.
  highlights:
    - "BridgeDP Engine: разработка движений без кода и порога входа"
    - "Извлечение действий из видео, визуальное редактирование, интеллектуальный ретаргетинг"
    - "Совместимость с Unitree G1, Booster T1"
