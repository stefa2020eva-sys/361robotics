en:
  description: |
    BridgeDP provides motion control solutions (omnidirectional locomotion and whole-body imitation) and BridgeDP Engine zero-code motion development platform for humanoid and quadruped robots.
  highlights:
    - "BridgeDP Engine: zero-code, zero-threshold motion development"
    - "Video-to-action extraction, visual editing, intelligent retargeting"
    - "Adapted to Unitree G1, Booster T1"
    - 3 minutes to deploy actions
